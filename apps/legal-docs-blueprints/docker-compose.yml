services:
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      - GOTENBERG_LOG_LEVEL=INFO
      # Límites de LibreOffice para evitar consumo excesivo
      - GOTENBERG_LIBREOFFICE_DISABLE_ROUTES=false
      - GOTENBERG_LIBREOFFICE_AUTO_START=true
      - GOTENBERG_LIBREOFFICE_START_TIMEOUT=30s
    # CRÍTICO: Límites de recursos para evitar OOM
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - legal-docs-network

  app:
    build: .
    ports:
      - "${PORT:-4000}:4000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4000
      - GOTENBERG_URL=http://gotenberg:3000
      - DOCUMENSO_API_TOKEN=${DOCUMENSO_API_TOKEN}
      - DOCUMENSO_BASE_URL=${DOCUMENSO_BASE_URL}
      - CRM_API_URL=${CRM_API_URL:-http://host.docker.internal:3000}
      - CRM_SERVICE_ACCOUNT_EMAIL=${CRM_SERVICE_ACCOUNT_EMAIL}
      - CRM_SERVICE_ACCOUNT_PASSWORD=${CRM_SERVICE_ACCOUNT_PASSWORD}
    # CRÍTICO: Límites de recursos para evitar memory leaks
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
        reservations:
          memory: 256M
    depends_on:
      gotenberg:
        condition: service_healthy
    # CRÍTICO: Healthcheck para que Coolify detecte caídas
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - legal-docs-network
    volumes:
      - ./output:/app/output
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  legal-docs-network:
    driver: bridge
